packages:
  - "apps/*"
  - "packages/*"

# Dependencias nativas con scripts de build aprobados explícitamente (política supply-chain de pnpm).
# - sharp: análisis/optimización de imágenes (Next.js + motor de verificación, Épica 6)
# - prisma / @prisma/*: descarga de query engines (ORM, Épica 2)
# - esbuild: usado por tsx para ejecutar scripts TS (seed, etc.)
# - protobufjs: dependencia transitiva de @google-cloud/vision (E05-T1); su postinstall
#   solo genera bindings JS de protobuf, no compila nativo.
# - @whiskeysockets/baileys (E07-T1): su único build script es `prepare` (compila la
#   librería DESDE la fuente). El paquete publicado ya trae `lib/` prebuilt, así que ese
#   script es innecesario y requeriría toolchain de dev. Se deniega explícitamente (false).
allowBuilds:
  sharp: true
  prisma: true
  "@prisma/client": true
  "@prisma/engines": true
  esbuild: true
  protobufjs: true
  msgpackr-extract: true
  "@whiskeysockets/baileys": false
